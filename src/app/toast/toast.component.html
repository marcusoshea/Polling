<div class="toast-stack" aria-live="assertive">
  <div *ngFor="let toast of toasts"
       class="alert toast-item"
       [ngClass]="toast.kind === 'error' ? 'alert-danger' : 'alert-success'"
       role="alert">
    <span class="toast-message">{{ toast.message }}</span>
    <button type="button" class="toast-dismiss" aria-label="Dismiss" (click)="dismiss(toast.id)">&times;</button>
  </div>
</div>
